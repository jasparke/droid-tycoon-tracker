services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: dtt
      POSTGRES_PASSWORD: dtt
      POSTGRES_DB: dtt
    ports: ["5432:5432"]
    volumes:
      - dtt-dev-pg:/var/lib/postgresql/data
      - ./scripts/dev-init.sql:/docker-entrypoint-initdb.d/10-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dtt"]
      interval: 3s
      timeout: 3s
      retries: 20
volumes:
  dtt-dev-pg:
