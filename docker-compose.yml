name: dtt-prod
services:
  app:
    build: ./app
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://dtt:${POSTGRES_PASSWORD:?set in .env}@db:5432/dtt
      ORIGIN: ${ORIGIN:?set in .env} # e.g. https://droids.example.lan — required by adapter-node for form origin checks
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:?set in .env} # externally-visible base URL; must match ORIGIN
      OIDC_ISSUER_URL: ${OIDC_ISSUER_URL:?set in .env}
      OIDC_CLIENT_ID: ${OIDC_CLIENT_ID:?set in .env}
      OIDC_CLIENT_SECRET: ${OIDC_CLIENT_SECRET:?set in .env}
      OIDC_REDIRECT_URI: ${OIDC_REDIRECT_URI:?set in .env} # must equal PUBLIC_BASE_URL + /api/auth/oidc/callback
    ports: ["3000:3000"]
    depends_on:
      db: { condition: service_healthy }
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: dtt
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set in .env}
      POSTGRES_DB: dtt
    volumes: [dtt-pg:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dtt"]
      interval: 5s
      timeout: 3s
      retries: 20
volumes:
  dtt-pg:
