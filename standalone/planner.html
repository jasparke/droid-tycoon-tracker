<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Droid Tycoon — Rebirth Tracker</title>
<style>
  :root{
    --bg:#05080f; --panel:#0d1422; --panel2:#111c30; --line:#1e2c44;
    --txt:#e7eefb; --muted:#8095b3; --accent:#22b3ff; --accent2:#1488d6;
    --base:#cfd8e6; --gold:#ffcf3f; --diamond:#4fd0ff; --rainbow:#ff6ad5; --beskar:#b3aa9c;
    --good:#37d67a; --nova:#7b8cff;
  }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{margin:0;background:radial-gradient(1200px 700px at 50% -200px,#10243f 0%,var(--bg) 60%);
    color:var(--txt);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    padding:10px;height:100vh;overflow:hidden}
  .wrap{max-width:1100px;margin:0 auto;height:100%;display:flex;flex-direction:column;gap:10px}
  .top{flex:0 0 auto;display:flex;flex-direction:column;gap:8px}
  /* collapsible panels */
  .pane{background:var(--panel);border:1px solid var(--line);border-radius:12px;display:flex;flex-direction:column;overflow:hidden;min-height:0}
  .pane-main{flex:1 1 auto}
  .pane-chips{flex:0 0 auto}
  .pane.collapsed{flex:0 0 auto}
  .pane.collapsed .pane-b{display:none}
  .pane-h{display:flex;align-items:center;gap:10px;padding:8px 14px;cursor:pointer;flex:0 0 auto}
  .pane:not(.collapsed) .pane-h{border-bottom:1px solid var(--line)}
  .pane-h .tabs{margin:0}
  .pane-b{overflow-y:auto;padding:12px 14px;min-height:0}
  .pane-title{font-weight:700;font-size:14px;color:var(--accent)}
  .caret{margin-left:auto;color:var(--muted);font-size:12px;transition:transform .15s}
  .pane.collapsed .caret{transform:rotate(-90deg)}
  h1{font-size:18px;letter-spacing:1px;margin:0;text-align:center;text-transform:uppercase}
  .sub{display:none}
  .searchwrap{position:relative;max-width:460px;margin:0 auto;width:100%}
  #search{width:100%;padding:11px 14px;font-size:14px;background:var(--panel2);color:var(--txt);
    border:1px solid var(--line);border-radius:8px}
  #search:focus{outline:none;border-color:var(--accent)}
  .panel{position:absolute;top:46px;left:0;right:0;background:var(--panel2);border:1px solid var(--accent);
    border-radius:10px;box-shadow:0 12px 40px rgba(0,0,0,.6);z-index:50;overflow:hidden;max-height:62vh;overflow-y:auto}
  .hovercard{position:fixed;z-index:200;width:440px;max-width:92vw;background:var(--panel2);
    border:1px solid var(--accent);border-radius:10px;box-shadow:0 14px 44px rgba(0,0,0,.7);overflow:hidden}
  [data-droid]{cursor:help}
  .pitem{padding:12px 14px;border:1px solid var(--line);border-radius:12px;background:var(--panel);margin-bottom:10px}
  .pitem:last-child{border-bottom:none}
  .pitem .ptop{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .pname{font-weight:700;font-size:15px;white-space:nowrap}
  .pstatus{margin-left:auto;font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;padding:2px 8px;border-radius:999px}
  .pstatus.need{background:#0f2a1c;color:var(--good)}
  .pstatus.done{background:#2a1010;color:#ff8d8d}
  .pstatus.other{background:#1b2233;color:#9fb0cc}
  .pother{margin-top:8px;font-size:11px;color:var(--muted)}
  .pcyc{margin-top:6px;display:flex;flex-wrap:wrap;gap:5px;align-items:center;font-size:11px}
  .pcyc b{color:var(--txt);font-weight:700;margin-right:4px}
  .pchips{display:flex;flex-wrap:wrap;gap:10px;margin-top:8px;align-items:flex-start}
  .pcol{display:flex;flex-direction:column;align-items:center;gap:5px;min-width:76px}
  .pcol.checkable{cursor:pointer;border-radius:8px}
  .pcol.checkable:hover .pchip{outline:2px solid var(--accent)}
  .pcol.got .pchip{box-shadow:0 0 0 2px var(--good) inset}
  .pcol.got .rtag{color:var(--good)!important;text-decoration:none!important;opacity:1!important}
  .pcol.past{opacity:.4}
  .pcol.future .pchip{outline:1px solid var(--good)}
  .pchip{display:inline-block;min-width:66px;text-align:center;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;padding:3px 8px;border-radius:999px;white-space:nowrap}
  .pchip .lv{opacity:.65;font-weight:600;margin-left:3px}
  .rtag{font-size:10px;font-weight:800;letter-spacing:.3px;line-height:1}
  .rtag.need{color:var(--good)}
  .rtag.past{color:var(--muted);text-decoration:line-through;opacity:.7}
  .rtag.none{color:#33405c}
  .rtag.have{color:var(--good)}
  .dimg{width:30px;height:30px;object-fit:contain;border-radius:5px;background:#0a1322;flex:0 0 auto}
  .req .dimg{width:24px;height:24px}
  .kcard .dimg{width:28px;height:28px}
  .have{font-size:10px;font-weight:800;letter-spacing:.3px;color:var(--good);background:#0f2a1c;padding:2px 8px;border-radius:999px;white-space:nowrap}
  .qpill{display:inline-flex;align-items:center;gap:2px;margin-top:5px;background:var(--panel2);border:1px solid var(--line);border-radius:999px;padding:1px 2px}
  .qbtn{width:20px;height:20px;border-radius:50%;border:none;background:transparent;color:var(--txt);font-size:14px;font-weight:800;line-height:1;cursor:pointer;display:flex;align-items:center;justify-content:center}
  .qbtn:hover{color:var(--accent)}
  .qn{min-width:16px;text-align:center;font-size:12px;font-weight:800;color:#33405c}
  .qn.pos{color:var(--good)}
  .pcol.hascnt .qpill{border-color:var(--good)}
  .cmeta{font-size:10px;font-weight:800;letter-spacing:.3px;padding:2px 7px;border-radius:999px;text-transform:uppercase;white-space:nowrap}
  .cmeta.Common{background:#26303f;color:#cfd8e6}
  .cmeta.Rare{background:#0a2236;color:#5cc8ff}
  .cmeta.Epic{background:#241033;color:#c89bff}
  .cmeta.Legendary{background:#332806;color:#ffcf3f}
  .cmeta.Mythic{background:#330a18;color:#ff6a8a}
  .cmeta.Iconic{background:#10231a;color:#7fffd4}
  .unlk{color:#7fd9c0}
  .refsec{margin-bottom:14px}
  .refh{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;color:var(--accent);margin:0 0 6px}
  .refrow{display:flex;gap:10px;font-size:11px;padding:3px 0;border-top:1px solid var(--line)}
  .refrow:first-of-type{border-top:none}
  .refrow.flw{flex-wrap:wrap;gap:14px;border:none}
  .refn{min-width:160px;font-weight:600;color:var(--txt)}
  .refv{color:var(--muted)}
  /* planner */
  .plansum{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:12px 14px;margin-bottom:12px}
  .npill.owned{opacity:.45}
  .planrow{display:flex;align-items:center;gap:10px;padding:7px 10px;border:1px solid var(--line);border-radius:9px;margin-bottom:6px;cursor:pointer;font-size:12px}
  .planrow:hover{border-color:var(--accent)}
  .planrow.on{background:#0f2033;border-color:var(--accent2)}
  .planrow input{width:16px;height:16px;flex:0 0 auto;cursor:pointer}
  .planlv{font-weight:800;min-width:34px}
  .plancr{color:var(--muted);min-width:70px}
  .plandr{color:var(--txt);opacity:.85;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .cost1{font-size:11px;font-weight:800;line-height:1.2;display:inline-flex;align-items:center}
  .cost1.dim{color:#33405c}
  .cost1 .chipi{margin-left:2px;opacity:.9}
  .earn{font-size:10px;font-weight:700;color:#bfe9d2;white-space:nowrap}
  .earn.dim{color:#33405c;font-weight:600}
  .cost{font-size:10px;font-weight:700;line-height:1.45;text-align:center}
  .cost div{white-space:nowrap}
  .cost .ctgt{font-size:9px;letter-spacing:.5px;text-transform:uppercase;opacity:.9;margin-bottom:2px}
  .cost span{opacity:.55;font-weight:600;margin-right:2px}
  .pempty{padding:14px;color:var(--muted);font-size:13px;text-align:center}
  /* planner: sort + view controls */
  .plctl{display:flex;flex-wrap:wrap;align-items:center;gap:10px;margin:2px 0 12px}
  .plctl label{font-size:11px;color:var(--muted);display:inline-flex;align-items:center;gap:6px}
  .plctl select{padding:5px 9px;font-size:12px}
  .plctl .minibtn{padding:5px 11px;font-size:12px;font-weight:600}
  .cyclebtns{display:inline-flex;gap:4px;flex-wrap:wrap}
  .cyclebtns .cybtn{padding:4px 10px;border:1px solid var(--muted);border-radius:6px;background:transparent;color:inherit;cursor:pointer;font:inherit;line-height:1.2}
  .cyclebtns .cybtn:hover{border-color:var(--accent)}
  .cyclebtns .cybtn.active{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent) inset;color:var(--accent)}
  /* planner: mini-cards (icon-top, grouped by sellability) */
  .plctl{position:sticky;top:0;z-index:6;background:var(--panel);padding:6px 0;margin:2px 0 12px}
  .plfind{flex:1 1 auto;min-width:120px;max-width:260px;padding:6px 10px;font-size:12px;background:var(--panel2);color:var(--txt);border:1px solid var(--line);border-radius:7px}
  .plfind:focus{outline:none;border-color:var(--accent)}
  .plfind.nomatch{border-color:#ff8d8d;color:#ff8d8d}
  .plfind.nomatch::placeholder{color:#ff8d8d;opacity:.8}
  .plfindn{font-size:11px;color:var(--muted);white-space:nowrap}
  .plfindn.nomatch{color:#ff8d8d}
  .plfindwrap{position:relative;display:inline-flex;flex:1 1 auto;min-width:120px;max-width:260px}
  .plfindwrap .plfind{flex:1 1 auto;min-width:0;max-width:none;width:100%;padding-right:26px}
  .plfindx{position:absolute;right:5px;top:50%;transform:translateY(-50%);width:17px;height:17px;padding:0;border:none;background:transparent;color:var(--muted);font-size:15px;line-height:1;cursor:pointer;align-items:center;justify-content:center}
  .plfindx:hover{color:var(--txt)}
  .plctl .danger{color:var(--muted)}
  .plctl .danger:hover{border-color:#ff8d8d;color:#ff8d8d}
  .pl-group{margin:0 0 16px}
  .pl-gh{position:sticky;top:44px;z-index:4;background:var(--panel);font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);
    margin:0 0 8px;padding:6px 0 5px;border-bottom:1px solid var(--line)}
  .pl-gc{color:var(--accent);margin-left:6px}
  .pl-sellh{color:#ff8d8d;border-bottom-color:rgba(255,107,107,.45)}
  .pl-sellh .pl-gc{color:#ff8d8d}
  .pl-sellbtn{margin-left:10px;font-size:10px;font-weight:700;text-transform:none;letter-spacing:0;color:#ff8d8d;background:transparent;border:1px solid rgba(255,107,107,.5);border-radius:6px;padding:2px 8px;cursor:pointer}
  .pl-sellbtn:hover{background:rgba(255,107,107,.12)}
  #planner .pl-sell .plcard{border-color:#ff6b6b!important;box-shadow:0 0 0 1px #ff6b6b}   /* sellable: full red border */
  .pl-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(var(--pcw,136px),1fr));max-width:calc(var(--pcn,6) * (var(--pcw,136px) + 8px));gap:8px}
  .plcard{position:relative;border:1px solid var(--line);border-radius:10px;padding:9px 7px;cursor:pointer;text-align:center;
    background:linear-gradient(180deg,var(--panel2),var(--panel));
    display:flex;flex-direction:column;align-items:center;gap:6px;transition:transform .08s}
  .plcard:hover{transform:translateY(-1px)}
  .plcard.owned{opacity:.82;border-color:var(--line)!important;background:linear-gradient(180deg,var(--panel2),var(--panel))!important}   /* owned: neutral frame, name stays coloured */
  .plcard.added{border-style:dashed}
  .pc-rm{position:absolute;top:2px;right:4px;width:15px;height:15px;line-height:13px;text-align:center;border-radius:50%;
    background:rgba(255,141,141,.15);color:#ff8d8d;font-size:12px;font-weight:800;cursor:pointer;z-index:2}
  .pc-rm:hover{background:#ff8d8d;color:#05080f}
  .npill.added{border:1px dashed currentColor}
  .npill .pc-rm{position:static;display:inline-flex;align-items:center;justify-content:center;margin-left:4px}
  /* planner popovers */
  .planpop{position:fixed;z-index:300;background:var(--panel2);border:1px solid var(--accent);border-radius:10px;
    box-shadow:0 14px 44px rgba(0,0,0,.7);padding:10px}
  .pp-h{font-size:11px;font-weight:700;color:var(--muted);margin:0 0 8px;text-transform:uppercase;letter-spacing:.4px}
  .tpick-row{display:flex;gap:6px}
  .tpick-b{min-width:36px;padding:6px 4px;border:1px solid;border-radius:8px;font-size:11px;font-weight:800;cursor:pointer;
    display:flex;flex-direction:column;align-items:center;gap:2px}
  .tpick-c{font-size:9px;font-weight:700;opacity:.85;min-height:11px}
  .apick-in{width:230px;max-width:62vw;padding:6px 10px;font-size:12px;background:var(--panel);color:var(--txt);border:1px solid var(--line);border-radius:7px;margin-bottom:8px}
  .apick-in:focus{outline:none;border-color:var(--accent)}
  .apick-list{max-height:240px;overflow-y:auto;display:flex;flex-direction:column;gap:2px;min-width:230px}
  .apick-b{display:flex;justify-content:space-between;align-items:center;gap:8px;padding:6px 9px;background:transparent;border:1px solid transparent;border-radius:6px;color:var(--txt);font-size:12px;font-weight:600;cursor:pointer;text-align:left}
  .apick-b:hover{background:var(--panel);border-color:var(--line)}
  .apick-x{font-size:9px;color:var(--muted);font-weight:600}
  .apick-empty{color:var(--muted);font-size:12px;padding:6px 9px}
  .plcard.dim{opacity:.2;filter:saturate(.5)}
  .plcard.hit{box-shadow:0 0 0 2px var(--accent),0 0 16px -2px rgba(34,179,255,.5)}
  .pc-icon{display:flex;justify-content:center;width:100%}
  .pc-iwrap{display:inline-flex;border:2px solid;border-radius:9px}   /* border-color = class colour (set inline), kept subtle */
  .pc-icon .dimg{width:82%;aspect-ratio:1;height:auto;display:block;border-radius:8px;margin:0 auto}   /* icon scales with card width */
  .pc-name{font-weight:700;font-size:11px;line-height:1.15;max-width:100%;overflow-wrap:anywhere}   /* wrap, never truncate */
  .pc-rbs{display:flex;flex-wrap:nowrap;gap:3px;max-width:100%;overflow-x:auto;justify-content:center}
  .pc-rbs::-webkit-scrollbar{height:0}
  .pc-rb{font-size:9px;font-weight:600;border:1px solid;border-radius:6px;padding:1px 4px;cursor:pointer;line-height:1.35;flex:0 0 auto}
  .pc-rb.met{font-weight:800}   /* bold only when owned/marked */
  .pc-rb.bk{box-shadow:0 0 6px -1px var(--beskar)}   /* Beskar chips pop */
  .pc-rb.none{background:transparent!important;color:var(--muted)!important;opacity:.5;cursor:default;box-shadow:none}   /* tier not needed */
  .pc-rb:hover{filter:brightness(1.18)}
  .npill.dim{opacity:.2}
  .npill.hit{outline:2px solid var(--accent)}
  /* planner full-view: hide checklist-only chrome while the Planner tab is active */
  body.planfocus .searchwrap,body.planfocus #stats,body.planfocus #curLbl,body.planfocus #hideLbl,body.planfocus #resetBtn{display:none}
  .controls{display:flex;flex-wrap:wrap;gap:12px;align-items:center;justify-content:center;
    background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:10px 16px;margin:0}
  .controls label{font-size:13px;color:var(--muted)}
  .profgrp{display:inline-flex;align-items:center;gap:4px;padding-right:10px;border-right:1px solid var(--line)}
  .profgrp button{padding:6px 9px;font-size:12px;line-height:1}
  .profgrp select{font-weight:700;color:var(--txt)}
  #syncBtn.synced{border-color:var(--good);color:var(--good)}
  #syncBtn.syncerr{border-color:#ff8d8d;color:#ff8d8d}
  select,button{background:var(--panel2);color:var(--txt);border:1px solid var(--line);border-radius:8px;padding:8px 12px;font-size:13px;cursor:pointer}
  button:hover,select:hover{border-color:var(--accent)}
  .tabs{display:flex;gap:8px;justify-content:center;margin-bottom:14px;flex-wrap:wrap}
  .tab{padding:8px 16px;border-radius:999px;background:var(--panel);border:1px solid var(--line);color:var(--muted);cursor:pointer;font-size:13px;font-weight:600}
  .tab.active{background:var(--accent2);color:#fff;border-color:var(--accent)}
  .stat-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin:0}
  .stat{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:14px;text-align:center}
  .stat.btn{cursor:pointer;border-color:var(--accent2);background:linear-gradient(180deg,#10243f,var(--panel));user-select:none}
  .stat.btn:hover{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent) inset}
  .stat.btn:active{transform:translateY(1px)}
  .stat .num{font-size:22px;font-weight:700;color:var(--accent)}
  .stat .lbl{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-top:2px}
  .bar{height:8px;background:#0a1322;border-radius:99px;overflow:hidden;margin-top:8px}
  .bar > i{display:block;height:100%;background:linear-gradient(90deg,var(--accent2),var(--accent));width:0}
  .legend{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin:0 0 10px;font-size:11px;color:var(--muted)}
  .legend span{display:inline-flex;align-items:center;gap:5px}
  .dot{width:10px;height:10px;border-radius:3px;display:inline-block}
  .rb{background:var(--panel);border:1px solid var(--line);border-radius:12px;margin-bottom:12px;overflow:hidden}
  .rb.done{border-color:#1d6b41;background:linear-gradient(180deg,#0c1b15,var(--panel))}
  .rb.current{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent) inset}
  .gap{text-align:center;color:var(--good);font-size:11px;font-weight:600;letter-spacing:.3px;
    margin:2px 0 12px;padding:6px;border:1px dashed #1d6b41;border-radius:8px;opacity:.75}
  .gap-hd{cursor:pointer;user-select:none}
  .gap:hover{opacity:1;border-color:var(--good)}
  .gap.open{opacity:1;margin-bottom:8px}
  .gap-title{font-weight:800;font-size:12px}
  .gap-sub{font-size:9px;color:var(--muted);font-weight:700;margin-top:3px;text-transform:uppercase;letter-spacing:.6px}
  .gap-grid{margin-top:10px;display:flex;flex-direction:column;gap:6px;text-align:left}
  .gap-row{display:flex;flex-wrap:wrap;gap:5px;align-items:center}
  .gap-lv{font-size:10px;font-weight:800;color:var(--muted);min-width:34px}
  .npill{font-size:10px;font-weight:700;padding:2px 8px 2px 3px;border-radius:999px;white-space:nowrap;display:inline-flex;align-items:center;gap:5px}
  .dimg.pimg{width:16px;height:16px;border-radius:4px}
  .dimg.nameimg{width:22px;height:22px}
  .rb-head{display:flex;align-items:center;gap:14px;padding:12px 16px}
  .rb-num{font-size:20px;font-weight:800;min-width:50px}
  .rb-num small{display:block;font-size:9px;color:var(--muted);letter-spacing:1px}
  .rb-meta{font-size:12px;color:var(--muted);line-height:1.5}
  .rb-meta b{color:var(--txt);font-weight:600}
  .rb-meta .nova{color:var(--nova)} .rb-meta .cr{color:var(--gold)} .rb-meta .xp{color:var(--good)}
  .rb-prog{margin-left:auto;font-size:12px;color:var(--muted);min-width:42px;text-align:right}
  .rb-check{color:var(--good);font-size:18px;width:18px}
  .reqs{padding:4px 16px 14px;display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:8px}
  .req{display:flex;align-items:center;gap:10px;background:var(--panel2);border:1px solid var(--line);border-radius:8px;padding:9px 12px;cursor:pointer;user-select:none}
  .req:hover{border-color:var(--accent)}
  .req.on{background:#0f2a1c;border-color:#2c8d57}
  .box{width:18px;height:18px;border-radius:5px;border:2px solid var(--muted);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:12px;color:#fff}
  .req.on .box{background:var(--good);border-color:var(--good)}
  .dname{font-weight:600;font-size:14px;white-space:nowrap}
  .tag{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;padding:2px 7px;border-radius:999px;margin-left:auto}
  .tag.havepill{opacity:.85}                       /* highest tier owned; no border = below requirement */
  .tag.havepill.met{opacity:1;border:1.5px solid currentColor}   /* meets/exceeds requirement */
  .Base{background:#26303f;color:var(--base)}
  .Gold{background:#3a2f08;color:var(--gold)}
  .Diamond{background:#0a2c3a;color:var(--diamond)}
  .Rainbow{background:#3a0a2c;color:var(--rainbow)}
  .Beskar{background:#222a35;color:var(--beskar)}
  .kcard{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:14px 16px;margin-bottom:10px}

let syncReady=false, syncT=null;
function syncCfg(){ const s=DB._sync; return (s&&s.url&&s.key&&s.code)?s:null; }
function setSyncStatus(t){ const b=document.getElementById('syncBtn'); if(b){ b.title="Sync — "+t; b.classList.toggle('synced',t==='synced'||t==='pushed'||t==='pulled'); b.classList.toggle('syncerr',/error|failed/i.test(t)); } }
async function api(path,opts){ const c=syncCfg(); if(!c) throw "no config";
  const r=await fetch(c.url.replace(/\/+$/,'')+'/rest/v1/'+path, Object.assign({},opts,{headers:Object.assign({apikey:c.key,Authorization:'Bearer '+c.key,'Content-Type':'application/json'},(opts&&opts.headers)||{})}));
  if(!r.ok) throw 'HTTP '+r.status; return r; }
async function pushSync(){ const c=syncCfg(); if(!c) return;
  const now=new Date().toISOString();
  await api('players',{method:'POST',headers:{Prefer:'resolution=merge-duplicates,return=minimal'},body:JSON.stringify({sync_code:c.code,data:{active:DB.active,seq:DB.seq,profiles:DB.profiles},updated_at:now})});
  DB._syncedAt=now; saveLocal(); setSyncStatus('pushed'); }
function adoptRemote(row,c){ undo=null; DB=Object.assign({},row.data,{_sync:c,_syncedAt:row.updated_at}); Object.values(DB.profiles).forEach(normProfile); if(!DB.profiles[DB.active])DB.active=Object.keys(DB.profiles)[0]; state=DB.profiles[DB.active]; saveLocal(); renderAll(); }
async function doSync(){ const c=syncCfg(); if(!c){ setupSync(); return; }
  setSyncStatus('syncing…');
  try{
    const rows=await (await api('players?sync_code=eq.'+encodeURIComponent(c.code)+'&select=data,updated_at')).json();
    const remote=rows[0];
    if(remote&&remote.data&&remote.data.profiles&&(!DB._syncedAt||remote.updated_at>DB._syncedAt)){ adoptRemote(remote,c); setSyncStatus('pulled'); }
    else { await pushSync(); }
    syncReady=true;
  }catch(e){ setSyncStatus('error'); }
}
function setupSync(){ const c=syncCfg()||{};
  const url=prompt("Supabase project URL (https://xxxx.supabase.co):", c.url||""); if(url==null) return;
  const key=prompt("Supabase anon (public) key:", c.key||""); if(key==null) return;
  const code=prompt("Sync code — a secret you reuse on every device:", c.code||""); if(code==null) return;
  DB._sync={url:url.trim(),key:key.trim(),code:code.trim()}; saveLocal(); doSync();
}
function save(){ saveLocal(); if(syncReady&&syncCfg()){ clearTimeout(syncT); syncT=setTimeout(()=>pushSync().catch(()=>setSyncStatus('error')),1200); } }
// ---- profile management ----
function switchProfile(id){ if(DB.profiles[id]){ undo=null; DB.active=id; state=DB.profiles[id]; save(); renderAll(); } }
function addProfile(name){ DB.seq=(DB.seq||1)+1; const id="p"+DB.seq; DB.profiles[id]=blankProfile(name); undo=null; DB.active=id; state=DB.profiles[id]; save(); renderAll(); }
function renameProfile(name){ if(name){ state.name=name; save(); renderControls(); } }
function deleteProfile(){ if(Object.keys(DB.profiles).length<=1) return false; delete DB.profiles[DB.active]; undo=null; DB.active=Object.keys(DB.profiles)[0]; state=DB.profiles[DB.active]; save(); renderAll(); return true; }
function exportProfile(){ try{ return btoa(unescape(encodeURIComponent(JSON.stringify({__dt:1,profile:state})))); }catch(e){ return ""; } }
function importProfile(code){
  if(!code) return 0;
  code=String(code).trim().replace(/^#/,'');
  let obj=null; try{obj=JSON.parse(decodeURIComponent(escape(atob(code))));}catch(e){ return 0; }
  let profs=[];
  if(obj&&obj.profile) profs=[obj.profile];                 // single-profile export
  else if(obj&&obj.profiles) profs=Object.values(obj.profiles); // full DB / old-hash DB
  else if(obj&&(obj.owned||obj.current!=null)) profs=[obj];  // legacy flat state (old URL hash)
  else return 0;
  profs.forEach(p=>{ DB.seq=(DB.seq||1)+1; const id="p"+DB.seq; const np=normProfile(Object.assign(blankProfile(p.name||"Imported"),p)); DB.profiles[id]=np; DB.active=id; state=np; });
  save(); renderAll(); return profs.length;
}
const cur=()=>CYCLES[state.cycle];


// global index of every droid across all 4 cycles
let GMAP=null;
function gmap(){
  if(GMAP) return GMAP;
  GMAP={};
  [1,2,3,4].forEach(cy=>CYCLES[cy].forEach(rb=>rb.r.forEach(([d,rar])=>{
    const id=d.toUpperCase();
    (GMAP[id]=GMAP[id]||{name:d,byCycle:{}});
    (GMAP[id].byCycle[cy]=GMAP[id].byCycle[cy]||[]).push({lv:rb.n,rar,d});
  })));
  Object.values(GMAP).forEach(m=>Object.values(m.byCycle).forEach(a=>a.sort((x,y)=>x.lv-y.lv)));
  return GMAP;
}

// ---- image cache: pulls each droid image once, stores bytes in IndexedDB, serves offline thereafter ----
const IMG_REMOTE="https://droidtrakr.com/droid-tycoon/assets/droids/";
const imgMem={};                 // file -> blob objectURL (this session)
let imgDB=null; const imgQ=new Set(); let imgBusy=false, imgT=null;
function imgOpen(){return new Promise(res=>{try{const rq=indexedDB.open('dt_imgs',1);
  rq.onupgradeneeded=()=>rq.result.createObjectStore('imgs'); rq.onsuccess=()=>res(rq.result); rq.onerror=()=>res(null);}catch(e){res(null);}});}
function idbGet(f){return new Promise(res=>{if(!imgDB)return res(null);try{const t=imgDB.transaction('imgs').objectStore('imgs').get(f);t.onsuccess=()=>res(t.result||null);t.onerror=()=>res(null);}catch(e){res(null);}});}
function idbPut(f,b){try{imgDB.transaction('imgs','readwrite').objectStore('imgs').put(b,f);}catch(e){}}
async function imgPump(){
  if(imgBusy||!imgDB)return; imgBusy=true;
  for(const f of [...imgQ]){ imgQ.delete(f); if(imgMem[f])continue;
    let b=await idbGet(f);
    if(!b){ try{const r=await fetch(IMG_REMOTE+f,{mode:'cors'}); if(r.ok){b=await r.blob(); idbPut(f,b);} }catch(e){} }
    if(b){ const u=URL.createObjectURL(b); imgMem[f]=u;
      document.querySelectorAll('img[data-file="'+f+'"]').forEach(el=>{el.src=u;el.removeAttribute('data-fb');}); }
  }
  imgBusy=false;
}
function imgWant(f){ if(!imgMem[f]){ imgQ.add(f); clearTimeout(imgT); imgT=setTimeout(imgPump,250); } }
imgOpen().then(db=>{imgDB=db; if(db)imgPump();});
function droidImg(name,rar,cls){const tf=rar==='Base'?'Default':rar; const f=normName(name)+"_"+tf+".webp"; imgWant(f);   // base art is named _Default.webp
  const src=imgMem[f]||("assets/droids/"+f);   // cached blob → local folder → remote (onerror)
  return `<img class="dimg ${cls||''}" data-file="${f}" src="${src}" alt="" loading="lazy" data-fb="${IMG_REMOTE}${f}" onerror="if(this.dataset.fb){this.src=this.dataset.fb;this.removeAttribute('data-fb');}else{this.style.visibility='hidden';}">`;}

function dmeta(name){return DMETA[String(name).toUpperCase().replace(/[^A-Z0-9]/g,"")]||null;}
const PLAN_SORTS={tier:"Tier / rarity",rb:"Order needed",alpha:"Alphabetical"};
const PLAN_GROUPS={sell:"Sellability",tier:"Tier",rb:"Rebirth level",none:"None"};
const PLAN_COLS=[3,4,5,6,7,8,10];   // max cards per row
const PLAN_SIZES={s:104,m:136,l:176};   // card min width (px) → also scales the icon
let planQuery="";   // in-planner search text (not persisted)
function renderPlanner(){
  const host=document.getElementById('planner');
  closePlanPop();
  if(!state.plan) state.plan={};
  const sel=new Set(cur().map(rb=>rb.n));   // planner always covers ALL droids for the cycle
  const sortMode=PLAN_SORTS[state.planSort]?state.planSort:'tier';
  const groupMode=PLAN_GROUPS[state.planGroup]?state.planGroup:'sell';
  const cardView=true;   // pill view removed — planner is always cards
  // combine droids across selected rebirths, keeping the highest rarity of each;
  // also record the first ticked rebirth each droid appears in + every ticked R# it's needed at
  const need={}, firstRB={}, rbsOf={};
  cur().forEach(rb=>{ if(sel.has(rb.n)) rb.r.forEach(([d,r])=>{
    const i=RIDX[r]; if(need[d]==null||i>need[d]) need[d]=i;
    if(firstRB[d]==null||rb.n<firstRB[d]) firstRB[d]=rb.n;
    (rbsOf[d]=rbsOf[d]||[]).push([rb.n,i]);   // [rebirth #, tier idx needed there]
  }); });
  // pre-pulled droids you've added by hand (not required by the ticked rebirths) — show their full cycle timeline
  const added=new Set((state.planAdd&&state.planAdd[state.cycle])||[]);
  added.forEach(d=>{
    if(need[d]!=null) return;   // already shown via a ticked rebirth
    const reqs=[]; cur().forEach(rb=>rb.r.forEach(([dd,r])=>{ if(dd===d) reqs.push([rb.n,RIDX[r]]); }));
    if(reqs.length){ let mx=-1; reqs.forEach(([n,ti])=>{ if(ti>mx)mx=ti; if(firstRB[d]==null||n<firstRB[d])firstRB[d]=n; }); need[d]=mx; rbsOf[d]=reqs.sort((a,b)=>a[0]-b[0]); }
    else { need[d]=Math.max(0,ownedIdx(state.cycle,d)); rbsOf[d]=[]; firstRB[d]=999; }   // not in this cycle at all
  });
  const rank=d=>RARRANK[(dmeta(d)||{}).cls]??-1;
  const items=Object.entries(need).sort((a,b)=>{
    const [da,ia]=a,[db,ib]=b;
    if(sortMode==='alpha') return da.localeCompare(db);
    if(sortMode==='rb')    return (firstRB[da]-firstRB[db])||da.localeCompare(db);
    return (ib-ia)||(rank(db)-rank(da))||da.localeCompare(db);   // tier: highest tier, then rarity, then name
  });
  const haveN=items.filter(([d,i])=>ownedIdx(state.cycle,d)>=i).length;
  const ctl=`<div class="plctl">
    ${cardView?`<label>Group <select id="planGroup">${Object.entries(PLAN_GROUPS).map(([v,l])=>`<option value="${v}"${v===groupMode?' selected':''}>${l}</option>`).join("")}</select></label>`:''}
    ${cardView?`<label title="Split multi-rebirth droids — one card per rebirth (switches to Rebirth-level grouping)"><input type="checkbox" id="planUnmerge"${state.planUnmerge?' checked':''} style="vertical-align:-2px"> Unmerge</label>`:''}
    ${cardView?`<label>Per row <select id="planCols">${PLAN_COLS.map(n=>`<option value="${n}"${n===(+state.planCols||6)?' selected':''}>${n}</option>`).join("")}</select></label>`:''}
    ${cardView?`<label>Size <select id="planSize">${['s','m','l'].map(v=>`<option value="${v}"${v===(PLAN_SIZES[state.planSize]?state.planSize:'m')?' selected':''}>${v.toUpperCase()}</option>`).join("")}</select></label>`:''}
    ${cardView?`<label>Sell list <select id="sellPos"><option value="top"${state.sellPos!=='bottom'?' selected':''}>Top</option><option value="bottom"${state.sellPos==='bottom'?' selected':''}>Bottom</option></select></label>`:''}
    <button id="planAdd" class="minibtn" title="Add a droid you're pulling early">＋ Add</button>
    <span class="plfindwrap"><input id="planFind" class="plfind" type="text" placeholder="🔍 find in plan…   ( / )" value="${planQuery.replace(/"/g,'&quot;')}"><button id="planFindX" class="plfindx" title="clear search" aria-label="clear search">×</button></span>
    <span id="planFindN" class="plfindn"></span>
  </div>`;
  let body;
  if(!items.length){
    body=`<div class="pempty">No droids in this cycle.</div>`;
  }else if(cardView){
    // Group by when a droid becomes sellable: bucket by its LAST needed rebirth (fully sellable by then).
    const BUCKETS=['Sellable after RB10','Sellable after RB15','Sellable after RB20','Keep · needed past RB20'];
    const bucketOf=n=>n<=10?0:n<=15?1:n<=20?2:3;
    const chipStyle=(ti,met)=>{const c=RC[TIERS[ti]];return met?`color:#05080f;background:${c};border-color:${c}`:`color:${c};border-color:${c};background:transparent`;};
    const makeCard=([d,i,onlyRb])=>{
      const tier=TIERS[i], tcol=TIERHEX[tier]||'#8095b3', isAdded=added.has(d);   // tier owns every colour on the card
      const have=ownedIdx(state.cycle,d)>=i;
      const chip=(txt,ti)=>{const m=isMet(state.cycle,d,TIERS[ti]);
        return `<span class="pc-rb${m?' met':''}${ti===4?' bk':''}" data-own="${state.cycle}|${d}|${TIERS[ti]}" style="${chipStyle(ti,m)}" title="R${txt}: ${TIERS[ti]}${m?' · owned':' · click to mark owned'}">${txt}</span>`;};
      let rbChips;
      if(onlyRb!=null){ rbChips=chip(onlyRb,i); }   // unmerged: just this rebirth
      else{                                          // merged: a slot per tier (Base→Beskar), "-" when that tier isn't needed
        const byTier={}; (rbsOf[d]||[]).forEach(([n,ti])=>{(byTier[ti]=byTier[ti]||[]).push(n);});
        rbChips=TIERS.map((t,ti)=> byTier[ti] ? chip(byTier[ti].sort((a,b)=>a-b).join('/'),ti)
          : `<span class="pc-rb none" style="border-color:${RC[t]}" title="${t}: not needed">-</span>`).join("");
      }
      return `<div class="plcard${have?' owned':''}${isAdded?' added':''}" data-own="${state.cycle}|${d}|${tier}" title="${d} · ${tier}${have?' · owned':''}${isAdded?' · added early':''}"
          style="border-color:${tcol};background:linear-gradient(180deg,${hexA(tcol,.13)},var(--panel))">
        ${isAdded?`<span class="pc-rm" data-rm="${state.cycle}|${d}" title="remove from plan">×</span>`:''}
        <div class="pc-name" style="color:${tcol}">${d}</div>
        <div class="pc-icon">${droidImg(d,tier,'cardimg')}</div>
        <div class="pc-rbs">${rbChips}</div>
      </div>`;};
    const maxRbOf=d=>{const a=rbsOf[d]&&rbsOf[d].length?rbsOf[d]:[[0]];return Math.max(...a.map(c=>c[0]));};
    const curR=getProgress();
    const sellNow=[], act=[];                                 // split off droids past their last needed rebirth
    items.forEach(it=>{ (maxRbOf(it[0])<=curR ? sellNow : act).push(it); });
    let grouped;
    if(groupMode==='tier'){                                   // group by top tier needed (Beskar → Base)
      const gs=[[],[],[],[],[]]; act.forEach(([d,i])=>gs[i].push([d,i]));
      grouped=TIERS.map((t,ti)=>({label:t,arr:gs[ti]})).reverse();
    }else if(groupMode==='rb'){                               // one group per rebirth level
      const byRb={};
      if(state.planUnmerge){ act.forEach(([d])=>(rbsOf[d]||[]).forEach(([n,ti])=>{ if(!isMet(state.cycle,d,TIERS[ti])) (byRb[n]=byRb[n]||[]).push([d,ti,n]); })); }   // hide requirements you already own
      else { act.forEach(([d,i])=>{const n=firstRB[d];(byRb[n]=byRb[n]||[]).push([d,i]);}); }
      grouped=Object.keys(byRb).map(Number).sort((a,b)=>a-b).map(n=>({label:'Rebirth '+n+' · '+CR[n-1],arr:byRb[n]}));
    }else if(groupMode==='none'){                             // flat, no headers
      grouped=[{label:null,arr:act.slice()}];
    }else{                                                    // sellability buckets (default)
      const gs=[[],[],[],[]]; act.forEach(([d,i])=>gs[bucketOf(maxRbOf(d))].push([d,i]));
      grouped=BUCKETS.map((label,gi)=>({label,arr:gs[gi]}));
    }
    const bySort=(a,b)=>(firstRB[a[0]]-firstRB[b[0]])||a[0].localeCompare(b[0]);
    grouped.forEach(g=>g.arr.sort(bySort));   // order needed within each group
    const groupsHtml=grouped.map(g=>g.arr.length?`<div class="pl-group">${g.label?`<div class="pl-gh">${g.label}<span class="pl-gc">${g.arr.length}</span></div>`:''}<div class="pl-cards">${g.arr.map(makeCard).join("")}</div></div>`:'').join("");
    let sellHtml='';
    if(sellNow.length){
      const sellOwned=sellNow.filter(([d])=>ownedIdx(state.cycle,d)>=0);   // still hold a copy → sell it
      const hiddenN=sellNow.length-sellOwned.length;                        // unowned/sold → hidden
      const shown=(state.sellShowHidden?sellNow:sellOwned).slice().sort(bySort);
      const toggle=hiddenN?`<button id="sellToggle" class="pl-sellbtn">${state.sellShowHidden?'hide sold':'show hidden ('+hiddenN+')'}</button>`:'';
      sellHtml=`<div class="pl-group pl-sell"><div class="pl-gh pl-sellh">Sellable now · past R${curR}<span class="pl-gc">${shown.length}</span>${toggle}</div><div class="pl-cards">${shown.map(makeCard).join("")}</div></div>`;
    }
    body=(state.sellPos==='bottom')?groupsHtml+sellHtml:sellHtml+groupsHtml;
  }else{
    body=`<div class="pchips" style="gap:8px">`+items.map(([d,i])=>{const tier=TIERS[i];const have=ownedIdx(state.cycle,d)>=i;const isAdded=added.has(d);
      return `<span class="npill ${tier}${have?' owned':''}${isAdded?' added':''}" data-own="${state.cycle}|${d}|${tier}" title="${have?'owned — click to unmark':'needed — click to mark owned'}">${droidImg(d,tier,'pimg')}${d}<span class="pk">${have?' ✓':''}</span>${isAdded?`<span class="pc-rm" data-rm="${state.cycle}|${d}" title="remove">×</span>`:''}</span>`;}).join("")+`</div>`;
  }
  const sum=`<div id="planCount" class="sub" style="display:block;margin:0 0 8px">${items.length} droid${items.length===1?'':'s'} this cycle · ${haveN} owned · ${items.length-haveN} to get</div>${ctl}${body}`;
  host.innerHTML=`<div class="plansum">${sum}</div>`;
  host.style.setProperty('--pcn', String(+state.planCols||6));   // max cards per row
  host.style.setProperty('--pcw', (PLAN_SIZES[state.planSize]||PLAN_SIZES.m)+'px');   // card size
  const ss=document.getElementById('planSort'); if(ss) ss.onchange=(ev)=>{state.planSort=ev.target.value;save();renderPlanner();};
  const gg=document.getElementById('planGroup'); if(gg) gg.onchange=(ev)=>{state.planGroup=ev.target.value;save();renderPlanner();};
  const um=document.getElementById('planUnmerge'); if(um) um.onchange=(ev)=>{state.planUnmerge=ev.target.checked; if(ev.target.checked) state.planGroup='rb'; save(); renderPlanner();};
  const zz=document.getElementById('planCols'); if(zz) zz.onchange=(ev)=>{state.planCols=+ev.target.value;save();renderPlanner();};
  const sp=document.getElementById('sellPos'); if(sp) sp.onchange=(ev)=>{state.sellPos=ev.target.value;save();renderPlanner();};
  const st=document.getElementById('sellToggle'); if(st) st.onclick=()=>{state.sellShowHidden=!state.sellShowHidden;save();renderPlanner();};
  const yy=document.getElementById('planSize'); if(yy) yy.onchange=(ev)=>{state.planSize=ev.target.value;save();renderPlanner();};
  const vb=document.getElementById('planView'); if(vb) vb.onclick=()=>{state.planCards=!state.planCards;save();renderPlanner();};
  const pf=document.getElementById('planFind'), fx=document.getElementById('planFindX');
  const updX=()=>{ if(fx) fx.style.display=planQuery?'flex':'none'; };
  if(pf) pf.oninput=(ev)=>{planQuery=ev.target.value;applyPlanFilter();updX();};
  if(fx) fx.onclick=()=>{planQuery='';if(pf){pf.value='';pf.focus();}applyPlanFilter();updX();};
  updX();
  const ab=document.getElementById('planAdd'); if(ab) ab.onclick=(ev)=>{ev.stopPropagation();openAddPicker(ab);};
  applyPlanFilter();
}
// live filter within the planner: matches light up (.hit), the rest fade (.dim); no re-render, so typing keeps focus
function applyPlanFilter(){
  const host=document.getElementById('planner'); if(!host) return;
  const q=planQuery.trim().toUpperCase();
  let hits=0;
  host.querySelectorAll('.plcard,.npill').forEach(el=>{
    const d=((el.getAttribute('data-own')||'').split('|')[1]||'').toUpperCase();
    const match=!q || d.includes(q);
    el.style.display=match?'':'none';        // hide non-matches while filtering
    el.classList.remove('dim','hit');
    if(q&&match) hits++;
  });
  host.querySelectorAll('.pl-group').forEach(g=>{                       // hide a group when none of its cards match
    const any=[...g.querySelectorAll('.plcard')].some(c=>c.style.display!=='none');
    g.style.display=any?'':'none';
  });
  const noMatch=!!q && hits===0;
  const n=document.getElementById('planFindN'); if(n){ n.textContent=q?`${hits} match${hits===1?'':'es'}`:''; n.classList.toggle('nomatch',noMatch); }
  const pf=document.getElementById('planFind'); if(pf) pf.classList.toggle('nomatch',noMatch);
}
// mark owned WITHOUT re-rendering — updates chips/cards/pills in place so the droid images never reload
function refreshPlanOwned(){
  const host=document.getElementById('planner'); if(!host) return;
  const chipStyle=(t,met)=>{const c=RC[t];return met?`color:#05080f;background:${c};border-color:${c}`:`color:${c};border-color:${c};background:transparent`;};
  host.querySelectorAll('.pc-rb[data-own]').forEach(ch=>{   // skip the muted "-" ladder slots (no data-own)
    const [cy,d,t]=ch.getAttribute('data-own').split('|'); const met=isMet(+cy,d,t);
    ch.setAttribute('style',chipStyle(t,met)); ch.classList.toggle('met',met);
    ch.title=`R${ch.textContent.replace(/^R/,'')}: ${t}${met?' · owned':' · click to mark owned'}`;
  });
  host.querySelectorAll('.plcard').forEach(card=>{
    const [cy,d,t]=card.getAttribute('data-own').split('|');
    card.classList.toggle('owned', ownedIdx(+cy,d)>=RIDX[t]);
  });
  host.querySelectorAll('.npill').forEach(p=>{
    const [cy,d,t]=p.getAttribute('data-own').split('|'); const have=ownedIdx(+cy,d)>=RIDX[t];
    p.classList.toggle('owned',have); const k=p.querySelector('.pk'); if(k) k.textContent=have?' ✓':'';
  });
  const el=document.getElementById('planCount');
  if(el){ const cards=host.querySelectorAll('.plcard,.npill'); const total=cards.length,
    owned=[...cards].filter(c=>c.classList.contains('owned')).length;
    el.textContent=`${total} droid${total===1?'':'s'} this cycle · ${owned} owned · ${total-owned} to get`; }
}
// ---- planner popovers: long-press tier picker + "＋ Add" droid picker ----
function planPopOutside(e){ const p=document.getElementById('planPop'); if(p&&!p.contains(e.target)) closePlanPop(); }
function planPopEsc(e){ if(e.key==='Escape') closePlanPop(); }
function closePlanPop(){ const p=document.getElementById('planPop'); if(p) p.remove();
  document.removeEventListener('mousedown',planPopOutside,true); document.removeEventListener('keydown',planPopEsc); }
function placePlanPop(pop,x,y){ const w=pop.offsetWidth,h=pop.offsetHeight,pad=10;
  let left=x-w/2; if(left+w>innerWidth-pad)left=innerWidth-w-pad; if(left<pad)left=pad;
  let top=y+14; if(top+h>innerHeight-pad)top=y-h-14; if(top<pad)top=pad;
  pop.style.left=left+'px'; pop.style.top=top+'px'; }
function armPlanPop(){ setTimeout(()=>{document.addEventListener('mousedown',planPopOutside,true);document.addEventListener('keydown',planPopEsc);},0); }
// long-press a card → pick ANY tier you own (including tiers the plan doesn't require)
function openTierPicker(card,x,y){
  closePlanPop();
  const [cy,d]=card.dataset.own.split('|');
  const pop=document.createElement('div'); pop.className='planpop'; pop.id='planPop';
  pop.innerHTML=`<div class="pp-h">${d} — own which tier?</div><div class="tpick-row">`+
    TIERS.map(t=>{const c=countAt(+cy,d,t),on=c>0,col=RC[t];
      return `<button class="tpick-b" data-tp="${cy}|${d}|${t}" style="color:${on?'#05080f':col};background:${on?col:'transparent'};border-color:${col}">${tierAbbr(t)||'B'}<span class="tpick-c">${c||''}</span></button>`;}).join("")+`</div>`;
  document.body.appendChild(pop); placePlanPop(pop,x,y);
  pop.addEventListener('click',ev=>{const b=ev.target.closest('[data-tp]'); if(!b)return; ev.stopPropagation();
    const [c2,d2,t2]=b.dataset.tp.split('|'); toggleTier(+c2,d2,t2); save(); if(state.planUnmerge) renderPlanner(); else refreshPlanOwned();
    b.blur();
    pop.querySelectorAll('[data-tp]').forEach(x=>{const t=x.dataset.tp.split('|')[2],c=countAt(+c2,d2,t),on=c>0,col=RC[t];
      x.style.color=on?'#05080f':col; x.style.background=on?col:'transparent'; x.querySelector('.tpick-c').textContent=c||'';});});
  armPlanPop();
}
// "＋ Add" → search every droid in the cycle (or beyond) and track it early
function openAddPicker(btn){
  closePlanPop();
  const cy=state.cycle;
  const shown=new Set(); document.querySelectorAll('#planner .plcard,#planner .npill').forEach(el=>shown.add((el.dataset.own||'').split('|')[1]));
  const inCycle=new Set(); cur().forEach(rb=>rb.r.forEach(([d])=>inCycle.add(d)));
  const cands=Object.values(gmap()).map(m=>m.name).filter(d=>!shown.has(d)).sort((a,b)=>a.localeCompare(b));
  const pop=document.createElement('div'); pop.className='planpop apick'; pop.id='planPop';
  pop.innerHTML=`<div class="pp-h">Add a droid you're pulling early</div><input class="apick-in" placeholder="type a droid…"><div class="apick-list"></div>`;
  document.body.appendChild(pop);
  const r=btn.getBoundingClientRect(); placePlanPop(pop,r.left+r.width/2,r.bottom);
  const inp=pop.querySelector('.apick-in'), listEl=pop.querySelector('.apick-list');
  const draw=q=>{const Q=q.trim().toUpperCase(); const rows=cands.filter(d=>d.toUpperCase().includes(Q)).slice(0,50);
    listEl.innerHTML=rows.length?rows.map(d=>`<button class="apick-b" data-add="${d}">${d}${inCycle.has(d)?'':'<span class="apick-x">not in cycle</span>'}</button>`).join(""):`<div class="apick-empty">no match</div>`;};
  draw('');
  inp.oninput=()=>draw(inp.value);
  pop.addEventListener('click',ev=>{const b=ev.target.closest('[data-add]'); if(!b)return; ev.stopPropagation();
    const d=b.dataset.add; if(!state.planAdd)state.planAdd={}; const arr=state.planAdd[cy]||(state.planAdd[cy]=[]); if(!arr.includes(d))arr.push(d); save(); closePlanPop(); renderPlanner();});
  armPlanPop(); setTimeout(()=>inp.focus(),0);
}


// ===================== RENDER =====================
function renderControls(){
  const ps=document.getElementById('profileSel');
  ps.innerHTML=Object.entries(DB.profiles).map(([id,p])=>`<option value="${id}"${id===DB.active?' selected':''}>${p.name}</option>`).join("");
  const cb=document.getElementById('cycleBtns');
  cb.innerHTML=Object.keys(CYCLES).map(cy=>`<button type="button" class="cybtn${(+cy===+state.cycle)?' active':''}" data-cycle="${cy}">${CYCLE_LABEL[cy]}</button>`).join("");
  const sel=document.getElementById('curSel');
  if(sel&&!sel.options.length)for(let i=0;i<=MAXRB;i++){const o=document.createElement('option');o.value=i;o.textContent="R"+i;sel.appendChild(o);}
  if(sel)sel.value=getProgress();
  const ub=document.getElementById('undoBtn'); if(ub) ub.disabled=!undoAvailable();
}
function renderAll(){
  renderControls();
  renderPlanner();
}

// ===================== EVENTS =====================
document.getElementById('profileSel').addEventListener('change',e=>switchProfile(e.target.value));
document.getElementById('newProf').addEventListener('click',()=>{const n=prompt("New profile name:","Player "+(Object.keys(DB.profiles).length+1));if(n)addProfile(n.trim()||"Player");});
document.getElementById('renProf').addEventListener('click',()=>{const n=prompt("Rename profile:",state.name);if(n)renameProfile(n.trim());});
document.getElementById('delProf').addEventListener('click',()=>{if(Object.keys(DB.profiles).length<=1){alert("Can't delete your only profile.");return;} if(confirm(`Delete profile "${state.name}" and all its progress?`)) deleteProfile();});
document.getElementById('expProf').addEventListener('click',async()=>{const code=exportProfile();if(!code){alert("Export failed.");return;}try{await navigator.clipboard.writeText(code);alert(`Copied "${state.name}" to clipboard. Paste it into Import on another device/browser to restore.`);}catch(e){prompt(`Copy this code for "${state.name}":`,code);}});
document.getElementById('impProf').addEventListener('click',()=>{const code=prompt("Paste a profile code (or an old URL # value) to import:");if(!code)return;const n=importProfile(code);alert(n?`Imported ${n} profile(s).`:"Couldn't read that code.");});
document.getElementById('syncBtn').addEventListener('click',doSync);
document.getElementById('undoBtn').addEventListener('click',doUndo);
document.getElementById('resetOwnedBtn').addEventListener('click',()=>{
  if(!confirm('Clear all owned marks for '+CYCLE_LABEL[state.cycle]+'?')) return;
  snapshot();
  Object.keys(state.counts).forEach(k=>{ if(k.startsWith(state.cycle+'|')) delete state.counts[k]; });
  save(); renderAll();
});
document.getElementById('superRebirthBtn').addEventListener('click',()=>{
  snapshot();
  const leaving=state.cycle;
  fullResetCycle(leaving);
  const n=Object.keys(CYCLES).length;      // 4 requirement sets
  state.cycle=(leaving % n)+1;             // wrap 4 -> 1
  save(); renderAll();
});
document.getElementById('cycleBtns').addEventListener('click',e=>{const b=e.target.closest('[data-cycle]');if(!b)return;state.cycle=+b.dataset.cycle;save();renderAll();});
document.getElementById('curSel').addEventListener('change',e=>{setProgress(+e.target.value);save();renderPlanner();});
document.getElementById('rebirthBtn').addEventListener('click',()=>{if(getProgress()<MAXRB){setProgress(getProgress()+1);save();renderAll();}});

// Planner: tick rebirth levels to include in the combined-needs summary
document.addEventListener('change',e=>{
  const c=e.target.closest('[data-plan]');
  if(!c) return;
  const n=+c.dataset.plan;
  if(!state.plan) state.plan={};
  const arr=state.plan[state.cycle]||(state.plan[state.cycle]=[]);
  const i=arr.indexOf(n); if(i>=0)arr.splice(i,1); else arr.push(n);
  save(); renderPlanner();
});
// click any rarity pip in the planner (cards + sellable list) to toggle owning that droid at that rarity
document.addEventListener('click',e=>{
  if(e.target.closest('[data-qt]')) return;   // −/+ buttons handle their own clicks
  if(e.target.closest('[data-rm]')) return;   // remove-from-plan × handles itself
  const el=e.target.closest('[data-own]');
  if(!el) return;
  const inSell=!!e.target.closest('.pl-sell');   // marking in the sellable list re-splits (unmark → hides)
  const [cy,d,rar]=el.dataset.own.split('|');
  toggleTier(+cy,d,rar);
  save();
  if(state.planUnmerge||inSell) renderPlanner(); else refreshPlanOwned();   // else in-place (no image reload)
});
// remove a manually-added (pre-pulled) droid from the plan
document.addEventListener('click',e=>{
  const r=e.target.closest('[data-rm]'); if(!r) return;
  e.stopPropagation();
  const [cy,d]=r.dataset.rm.split('|');
  const arr=(state.planAdd&&state.planAdd[cy])||[]; const i=arr.indexOf(d); if(i>=0) arr.splice(i,1);
  save(); renderPlanner();
});
// long-press a planner card → tier picker (mark a tier you have but the plan doesn't need)
let plLP=false, plLPtimer=null, plLPstart=null;
document.addEventListener('mousedown',e=>{
  if(e.target.closest('[data-rm]')) return;
  const card=e.target.closest('#planner .plcard'); if(!card) return;
  plLP=false; plLPstart={x:e.clientX,y:e.clientY};
  const cx=e.clientX, cy=e.clientY;
  clearTimeout(plLPtimer);
  plLPtimer=setTimeout(()=>{ plLP=true; openTierPicker(card,cx,cy); }, 380);
});
document.addEventListener('mousemove',e=>{ if(plLPstart&&(Math.abs(e.clientX-plLPstart.x)>16||Math.abs(e.clientY-plLPstart.y)>16)) clearTimeout(plLPtimer); });
document.addEventListener('mouseup',()=>{ clearTimeout(plLPtimer); plLPstart=null; });
document.addEventListener('click',e=>{ if(plLP){ plLP=false; e.stopPropagation(); e.preventDefault(); } }, true);   // swallow the click that ends a long-press
// right-click a card → tier picker (reliable alternative to press-and-hold)
document.addEventListener('contextmenu',e=>{
  const card=e.target.closest('#planner .plcard'); if(!card) return;
  e.preventDefault();
  openTierPicker(card, e.clientX, e.clientY);
});

// keyboard: "/" jumps to the in-plan search; Esc clears + blurs it
document.addEventListener('keydown',e=>{
  const t=e.target, tag=t.tagName||'';
  const typing=tag==='INPUT'||tag==='TEXTAREA'||tag==='SELECT'||t.isContentEditable;
  if(e.key==='/'&&!typing&&!e.metaKey&&!e.ctrlKey&&!e.altKey){ const f=document.getElementById('planFind'); if(f){ e.preventDefault(); f.focus(); f.select(); } }
  else if(e.key==='Escape'&&t.id==='planFind'){ planQuery=''; t.value=''; applyPlanFilter(); const fx=document.getElementById('planFindX'); if(fx) fx.style.display='none'; t.blur(); }
});

renderAll();saveLocal();   // persist locally immediately (writes hash + storage)
if(syncCfg()){ setSyncStatus('syncing…'); doSync(); } else { syncReady=true; }   // pull-then-push on load if configured
</script>
